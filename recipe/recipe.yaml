# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "6.11.0"
  python_check_max: "3.13"

recipe:
  name: pypdf
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/p/pypdf/pypdf-${{ version }}.tar.gz
    sha256: 062b51c81b0910e6d2755e99e1c5547a0a23b7d0a32322af66240d8edcfabe87
    target_directory: dist
  - url: https://github.com/py-pdf/pypdf/archive/refs/tags/${{ version }}.tar.gz
    sha256: e8e900bc7345b0acc7277365f1e2c986165a4fb36f0879b685af39f175e5c1e4
    target_directory: src

build:
  number: 0
  noarch: python

outputs:
  - package:
      name: pypdf
    build:
      noarch: python
      script:
        - cd dist
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
    requirements:
      host:
        - flit-core >=3.11,<4
        - pip
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - typing_extensions >=4.0
    tests:
      - python:
          imports: pypdf
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*

  - package:
      name: pypdf-with-crypto
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage("pypdf", exact=True) }}
        - cryptography >3.0
    tests:
      - python:
          imports: pypdf
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*

  - package:
      name: pypdf-with-fonts
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage("pypdf", exact=True) }}
        - fonttools
    tests:
      - python:
          imports: pypdf
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*

  - package:
      name: pypdf-with-image
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage("pypdf", exact=True) }}
        - pillow >=8.0.0
    tests:
      - python:
          imports: pypdf
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*

  - package:
      name: pypdf-with-full
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage("pypdf-with-crypto", exact=True) }}
        - ${{ pin_subpackage("pypdf-with-image", exact=True) }}
        - ${{ pin_subpackage("pypdf-with-fonts", exact=True) }}
        - ${{ pin_subpackage("pypdf", exact=True) }}
    tests:
      - python:
          imports: pypdf
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*

  - package:
      name: _pypdf-with-full-tests
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage("pypdf-with-full", exact=True) }}
    tests:
      - python:
          imports: pypdf
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_check_max }}.*
      - files:
          recipe:
            - test_all.py
          source:
            - src/pyproject.toml
            - src/tests/
            - src/resources/
        requirements:
          run:
            - fpdf
            - pytest-cov
            - pytest-socket
            - pytest-timeout
            - pyyaml
            - types-pillow
            - python ${{ python_min }}.*
        script:
          - python test_all.py

about:
  summary: A pure-python PDF library capable of splitting, merging, cropping, and transforming PDF files
  license: BSD-3-Clause
  license_file: dist/LICENSE
  homepage: https://pypi.org/project/pypdf
  repository: https://github.com/py-pdf/pypdf
  documentation: https://pypdf.readthedocs.io

extra:
  feedstock-name: pypdf
  recipe-maintainers:
    - MartinThoma
    - bollwyvl
